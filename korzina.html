<script>
document.querySelectorAll('[style-hover]').forEach(function(el){
  var base = el.getAttribute('style') || '';
  var hov = el.getAttribute('style-hover');
  el.addEventListener('mouseenter', function(){ el.style.cssText = base + ';' + hov; });
  el.addEventListener('mouseleave', function(){ el.style.cssText = base; });
});
document.querySelectorAll('[style-focus]').forEach(function(el){
  var base = el.getAttribute('style') || '';
  var foc = el.getAttribute('style-focus');
  el.addEventListener('focus', function(){ el.style.cssText = base + ';' + foc; });
  el.addEventListener('blur', function(){ el.style.cssText = base; });
});
</script>

<script>
(function () {
  var state = { lang: 'ru', currency: 'BYN', rates: null };

  function t(ru, en) { return state.lang === 'en' ? en : ru; }

  function lineHTML(line) {
    var noteHtml = line.note ? '<div style="font-size:12px;color:#6E6880;font-weight:600;margin-top:2px;">' + line.note[state.lang] + '</div>' : '';
    var moHtml = line.monthlyText ? '<div style="font-size:13px;color:#9B94AD;font-weight:600;">+ ' + line.monthlyText + t('/мес', '/mo') + '</div>' : '';
    return '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:16px 0;border-bottom:1px solid rgba(167,139,250,.1);">' +
      '<div>' +
        '<div style="font-size:15px;font-weight:700;">' + line.title[state.lang] + '</div>' +
        noteHtml +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:16px;flex:none;">' +
        '<div style="text-align:right;">' +
          '<div style="font-size:15px;font-weight:800;color:#C4B0FA;">' + (line.onceText || '—') + '</div>' +
          moHtml +
        '</div>' +
        '<button type="button" data-remove-key="' + line.key + '" aria-label="' + t('Удалить', 'Remove') + '" style="cursor:pointer;flex:none;width:28px;height:28px;border-radius:50%;border:1px solid rgba(235,120,120,.35);background:transparent;color:#EB7878;font-size:15px;line-height:1;">×</button>' +
      '</div>' +
    '</div>';
  }

  function emptyHTML() {
    return '<div style="text-align:center;padding:60px 20px;background:#0C0B12;border:1px solid rgba(167,139,250,.14);border-radius:26px;display:flex;flex-direction:column;align-items:center;gap:18px;">' +
      '<div style="font-size:17px;font-weight:700;color:#D8D3E6;">' + t('Корзина пока пустая', 'Your cart is empty') + '</div>' +
      '<a href="ceny.html" style="text-decoration:none;color:#0B0714;background:linear-gradient(135deg,#C4B0FA,#8B6CF7);font-weight:800;font-size:14px;padding:14px 28px;border-radius:100px;">' + t('Добавить услуги', 'Browse services') + '</a>' +
    '</div>';
  }

  function render() {
    var host = document.getElementById('cartContent');
    if (!host || !window.BSW_CART) return;
    var lines = window.BSW_CART.getLines(state.currency, state.rates);
    if (lines.length === 0) { host.innerHTML = emptyHTML(); return; }
    var totals = window.BSW_CART.getTotals(state.currency, state.rates);
    var rows = lines.map(lineHTML).join('');
    var totalsHtml = '<div style="display:flex;flex-direction:column;gap:6px;padding:20px 0 24px;">' +
      (totals.onceText ? '<div style="display:flex;justify-content:space-between;font-size:16px;font-weight:800;"><span>' + t('Итого разово', 'Total once') + '</span><span>' + totals.onceText + '</span></div>' : '') +
      (totals.monthlyText ? '<div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;color:#9B94AD;"><span>' + t('Итого в месяц', 'Total per month') + '</span><span>' + totals.monthlyText + '</span></div>' : '') +
    '</div>';
    host.innerHTML = '<div>' + rows + '</div>' + totalsHtml +
      '<a href="index.html#form" style="display:block;text-align:center;text-decoration:none;color:#0B0714;background:linear-gradient(135deg,#C4B0FA,#8B6CF7);font-weight:800;font-size:15px;padding:16px;border-radius:100px;">' + t('Оставить заявку', 'Get a quote') + '</a>';
  }

  document.addEventListener('click', function (e) {
    var btn = e.target.closest('[data-remove-key]');
    if (!btn) return;
    window.BSW_CART.remove(btn.getAttribute('data-remove-key'));
    render();
  });

  render();

  if (window.BSW) {
    window.BSW.onReady(function (currency, rates) {
      state.lang = document.documentElement.lang === 'en' ? 'en' : 'ru';
      state.currency = currency;
      state.rates = rates;
      render();
    });
  }
})();
</script>
